<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Why Aren’t Prospects Calling Your Agency?</title>

<style>
body {
  font-family: Georgia, serif;
  background: #ffffff;
  color: #000;
  padding: 20px;
}
.container {
  max-width: 700px;
  margin: auto;
}
h1 {
  color: #060644;
}
.progress-bar {
  width: 100%;
  height: 10px;
  background: #eee;
  margin-bottom: 20px;
}
.progress {
  height: 10px;
  background: #060644;
  width: 10%;
}
.answer {
  border: 1px solid #ccc;
  padding: 12px;
  margin: 10px 0;
  cursor: pointer;
}
.btn {
  background: #ffec4e;
  padding: 15px;
  width: 100%;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
.hidden {
  display: none;
}
</style>
</head>

<body>
<div class="container">

<h1>Why Aren’t Prospects Calling Your Agency?</h1>
<p>Take this 2-minute test to find out why prospects aren’t requesting a quote.</p>

<div class="progress-bar">
  <div id="progress" class="progress"></div>
</div>

<div id="quiz"></div>

<div id="form" class="hidden">

  <!-- 🔥 PASTE YOUR MAILERLITE FORM BELOW THIS LINE -->
  <!-- KEEP YOUR CURRENT FORM HERE -->

  <button class="btn" onclick="showResult()">Show My Result</button>

</div>

<div id="result" class="hidden"></div>

</div>

<script>

const questions = [
{
q: "When a prospect lands on your profile, what do they understand?",
a: [
"Exactly who I help and what to do next",
"They know I sell insurance",
"It’s unclear who I help"
]
},
{
q: "How do you present your services?",
a: [
"One clear offer",
"Some direction",
"Too many options"
]
},
{
q: "What happens when someone wants a quote?",
a: [
"One clear next step",
"A few options",
"Confusing process"
]
},
{
q: "What do your pinned posts do?",
a: [
"Explain, prove, and direct",
"Somewhat helpful",
"Outdated or random"
]
},
{
q: "How strong is your proof?",
a: [
"Very strong",
"Some proof",
"Weak or none"
]
},
{
q: "How consistent is your brand?",
a: [
"Very consistent",
"Somewhat",
"Inconsistent"
]
},
{
q: "How fast do you respond?",
a: [
"Fast",
"Okay",
"Slow"
]
},
{
q: "What have you tried?",
a: [
"Consistent effort",
"Some effort",
"Mostly referrals"
]
},
{
q: "Biggest challenge?",
a: [
"Getting leads",
"Converting leads",
"Keeping clients"
]
},
{
q: "Why aren’t prospects calling?",
a: [
"Unclear message",
"Lack of trust",
"Referral reliance"
]
}
];

let current = 0;
let score = 0;

function renderQuestion() {
  const q = questions[current];

  let html = `<h3>${current + 1}. ${q.q}</h3>`;

  q.a.forEach((a, i) => {
    let val = 2 - i;
    html += `
      <div class="answer">
        <input type="radio" name="q" value="${val}"> ${a}
      </div>
    `;
  });

  html += `<button class="btn" onclick="next()">Next</button>`;

  document.getElementById("quiz").innerHTML = html;

  document.getElementById("progress").style.width =
    ((current + 1) / questions.length) * 100 + "%";
}

function next() {
  const selected = document.querySelector('input[name="q"]:checked');

  if (!selected) {
    alert("Select an answer");
    return;
  }

  score += parseInt(selected.value);
  current++;

  if (current < questions.length) {
    renderQuestion();
  } else {
    document.getElementById("quiz").classList.add("hidden");
    document.getElementById("form").classList.remove("hidden");
  }
}

function showResult() {
  let title = "";
  let text = "";

  if (score <= 6) {
    title = "Unclear Agent";
    text = "Your messaging is unclear. Prospects don’t understand you fast enough.";
  } else if (score <= 11) {
    title = "Overloaded Agent";
    text = "You are overwhelming prospects with too many options.";
  } else if (score <= 16) {
    title = "Unproven Agent";
    text = "You are not showing enough proof to build trust.";
  } else {
    title = "Leaky Agent";
    text = "You are losing prospects right before they convert.";
  }

  document.getElementById("form").classList.add("hidden");

  document.getElementById("result").innerHTML = `
    <h2>${title}</h2>
    <p>${text}</p>
  `;

  document.getElementById("result").classList.remove("hidden");
}

renderQuestion();

</script>

</body>
</html>
